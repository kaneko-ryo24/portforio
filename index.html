<style>
  :root{
    --bg: #f7f5f0;
    --ink: #1a1a1a;
    --ink-soft: #5a564e;
    --ink-faint: #a8a39a;
    --rule: #e6e2d8;
    --paper: #fbfaf6;
    --accent: #1a1a1a;

    --serif: 'Cormorant Garamond', 'Shippori Mincho', 'Noto Serif JP', serif;
    --sans:  'Inter', 'Zen Kaku Gothic New', 'Noto Sans JP', system-ui, sans-serif;
    --jp-serif: 'Shippori Mincho', 'Noto Serif JP', serif;
    --jp-sans:  'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;

    --maxw: 1280px;
    --gutter: 14px;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    letter-spacing: 0.01em;
  }
  img{display:block;max-width:100%}
  a{color:inherit;text-decoration:none}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}

  /* ─── HEADER ─────────────────────────────────── */
  .nav{
    position: sticky; top:0; z-index: 100;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border-bottom: 1px solid color-mix(in srgb, var(--rule) 50%, transparent);
  }
  .nav-inner{
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 18px 32px;
    display:flex; align-items:center; justify-content:space-between;
    gap: 24px;
  }
  .brand{
    display:flex; flex-direction:column; line-height:1;
  }
  .brand .name{
    font-family: var(--serif);
    font-weight: 400;
    font-size: 22px;
    letter-spacing: 0.04em;
  }
  .brand .role{
    font-family: var(--sans);
    font-size: 9.5px;
    letter-spacing: 0.42em;
    color: var(--ink-soft);
    margin-top: 6px;
    text-transform: uppercase;
  }
  .nav-links{
    display:flex; gap: 36px; align-items:center;
  }
  .nav-links a{
    font-size: 11.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    transition: color .2s ease;
    position: relative;
    padding: 6px 0;
  }
  .nav-links a:hover, .nav-links a.active{ color: var(--ink); }
  .nav-links a.active::after{
    content:''; position:absolute; left:0; right:0; bottom:-2px;
    height: 1px; background: var(--ink);
  }

  /* ─── HERO ───────────────────────────────────── */
  .hero{
    max-width: var(--maxw); margin: 0 auto;
    padding: 100px 32px 80px;
    text-align: center;
  }
  .hero .eyebrow{
    font-size: 10px; letter-spacing: 0.5em;
    text-transform: uppercase; color: var(--ink-soft);
    margin-bottom: 28px;
  }
  .hero h1{
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(54px, 8vw, 108px);
    line-height: 0.98;
    letter-spacing: -0.01em;
    margin: 0 0 18px;
  }
  .hero h1 em{
    font-style: italic;
    font-weight: 300;
  }
  .hero .tag{
    font-family: var(--jp-serif);
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
    max-width: 540px;
    margin: 0 auto;
    line-height: 1.9;
  }
  .hero .scroll-cue{
    margin-top: 64px;
    font-size: 9.5px; letter-spacing: 0.4em;
    text-transform: uppercase; color: var(--ink-faint);
    display: inline-flex; align-items:center; gap: 12px;
  }
  .hero .scroll-cue::after{
    content:''; width: 32px; height: 1px; background: var(--ink-faint);
    display: inline-block;
  }

  /* ─── SECTION HEADER ─────────────────────────── */
  .section{
    max-width: var(--maxw); margin: 0 auto;
    padding: 80px 32px;
  }
  .sec-head{
    display:grid;
    grid-template-columns: auto 1fr auto;
    align-items: end;
    gap: 28px;
    margin-bottom: 40px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--rule);
  }
  .sec-head .num{
    font-family: var(--serif);
    font-style: italic; font-weight: 300;
    font-size: 18px; color: var(--ink-soft);
  }
  .sec-head .title{
    font-family: var(--serif);
    font-weight: 400;
    font-size: 36px;
    letter-spacing: 0.01em;
    line-height: 1;
  }
  .sec-head .title em{ font-style: italic; }
  .sec-head .jp{
    font-family: var(--jp-serif);
    font-size: 11.5px;
    color: var(--ink-soft);
    letter-spacing: 0.2em;
    text-align: right;
  }
  .sec-desc{
    font-size: 13px;
    color: var(--ink-soft);
    max-width: 560px;
    line-height: 1.8;
    margin: -20px 0 36px;
    font-family: var(--jp-sans);
    font-weight: 300;
  }

  /* ─── MASONRY ────────────────────────────────── */
  .masonry{
    column-gap: var(--gutter);
  }
  .masonry.cols-3{ column-count: 3; }
  .masonry.cols-4{ column-count: 4; }
  .masonry.cols-2{ column-count: 2; }
  @media (max-width: 900px){
    .masonry.cols-3, .masonry.cols-4{ column-count: 2; }
  }
  @media (max-width: 560px){
    .masonry.cols-3, .masonry.cols-4, .masonry.cols-2{ column-count: 1; }
  }

  .tile{
    break-inside: avoid;
    margin-bottom: var(--gutter);
    position: relative;
    cursor: zoom-in;
    overflow: hidden;
    background: var(--paper);
    border: 1px solid var(--rule);
  }
  .tile-inner{
    position: relative;
    width: 100%;
    overflow: hidden;
  }
  .tile img, .tile .ph{
    width: 100%; height: auto; display:block;
    transition: transform .9s cubic-bezier(.2,.7,.2,1), filter .4s ease;
  }
  .tile:hover img, .tile:hover .ph{ transform: scale(1.025); }

  .tile-meta{
    position: absolute; inset: auto 0 0 0;
    padding: 16px 14px 12px;
    background: linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,0));
    color: #fff;
    opacity: 0; transition: opacity .3s ease;
    pointer-events: none;
  }
  .tile:hover .tile-meta{ opacity: 1; }
  .tile-meta .t{
    font-family: var(--serif);
    font-size: 16px; font-weight: 400;
    letter-spacing: 0.01em;
  }
  .tile-meta .c{
    font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: .8; margin-top: 4px;
  }

  /* PLACEHOLDER (used until real images uploaded) */
  .ph{
    background-color: var(--ph-bg, #ece7dc);
    background-image:
      repeating-linear-gradient(135deg,
        rgba(0,0,0,.025) 0,
        rgba(0,0,0,.025) 1px,
        transparent 1px,
        transparent 8px);
    display:flex;
    align-items: center; justify-content: center;
    color: var(--ph-ink, #6b6256);
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
    padding: 16px;
    line-height: 1.6;
  }
  .ph .ph-key{ font-weight: 500; }
  .ph .ph-sub{ display:block; opacity:.6; font-size: 9px; margin-top: 6px; }

  /* video tiles */
  .tile.video .play-icon{
    position: absolute; inset: 0;
    display:flex; align-items:center; justify-content:center;
    pointer-events: none;
  }
  .tile.video .play-icon svg{
    width: 42px; height: 42px;
    fill: rgba(255,255,255,.95);
    filter: drop-shadow(0 2px 12px rgba(0,0,0,.4));
    transition: transform .3s ease;
  }
  .tile.video:hover .play-icon svg{ transform: scale(1.1); }

  /* ─── ABOUT ──────────────────────────────────── */
  .about{
    background: var(--paper);
    padding: 100px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .about-inner{
    max-width: 920px; margin: 0 auto;
    padding: 0 32px;
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 64px;
    align-items: start;
  }
  @media (max-width: 760px){ .about-inner{ grid-template-columns: 1fr; gap: 32px; } }
  .about-portrait{
    aspect-ratio: 3/4;
    background: var(--bg);
  }
  .about h2{
    font-family: var(--serif);
    font-weight: 300;
    font-size: 44px;
    margin: 0 0 6px;
    line-height: 1;
  }
  .about h2 em{ font-style: italic; }
  .about .h2-jp{
    font-family: var(--jp-serif);
    font-size: 12px; color: var(--ink-soft);
    letter-spacing: 0.3em;
    margin-bottom: 32px;
  }
  .about p{
    font-family: var(--jp-sans);
    font-size: 13px;
    line-height: 2.0;
    color: var(--ink);
    font-weight: 400;
    margin: 0 0 18px;
  }
  .about .info-list{
    margin-top: 28px;
    border-top: 1px solid var(--rule);
  }
  .about .info-row{
    display: grid; grid-template-columns: 110px 1fr;
    padding: 14px 0;
    border-bottom: 1px solid var(--rule);
    font-size: 12px;
  }
  .about .info-row dt{
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink);
  }
  .about .info-row dd{
    margin: 0;
    font-family: var(--jp-sans);
    color: var(--ink);
  }

  /* ─── CONTACT ────────────────────────────────── */
  .contact{
    max-width: 720px; margin: 0 auto;
    padding: 100px 32px;
    text-align: center;
  }
  .contact .eyebrow{
    font-size: 10px; letter-spacing: 0.5em;
    text-transform: uppercase; color: var(--ink-soft);
    margin-bottom: 16px;
  }
  .contact h2{
    font-family: var(--serif);
    font-weight: 300;
    font-size: 56px;
    margin: 0 0 14px;
    line-height: 1;
  }
  .contact h2 em{ font-style: italic; }
  .contact .lead{
    font-family: var(--jp-sans);
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 2;
    max-width: 480px;
    margin: 0 auto 48px;
    font-weight: 300;
  }
  .form{
    display:grid;
    gap: 22px;
    text-align: left;
  }
  .form-row{
    display:grid;
    gap: 8px;
  }
  .form-row label{
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .form-row label .jp{
    font-family: var(--jp-sans);
    font-size: 10px;
    letter-spacing: 0.1em;
    margin-left: 8px;
    text-transform: none;
    opacity: .7;
  }
  .form-row input,
  .form-row select,
  .form-row textarea{
    font: inherit;
    font-size: 14px;
    color: var(--ink);
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--rule);
    padding: 10px 0;
    outline: none;
    transition: border-color .2s ease;
    width: 100%;
    font-family: var(--jp-sans);
    font-weight: 300;
  }
  .form-row input:focus,
  .form-row select:focus,
  .form-row textarea:focus{
    border-bottom-color: var(--ink);
  }
  .form-row textarea{ min-height: 100px; resize: vertical; }
  .form-grid-2{ display:grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width:560px){ .form-grid-2{ grid-template-columns: 1fr; } }

  .submit{
    margin-top: 16px;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    padding: 18px 0;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    transition: background .2s ease, color .2s ease;
    cursor: pointer;
    width: 100%;
  }
  .submit:hover{ background: var(--ink); color: var(--bg); }

  /* ─── FOOTER ─────────────────────────────────── */
  footer{
    border-top: 1px solid var(--rule);
    padding: 48px 32px 36px;
    text-align: center;
  }
  .socials{
    display:inline-flex; gap: 22px; margin-bottom: 24px;
  }
  .socials a{
    width: 36px; height: 36px;
    border: 1px solid var(--rule);
    border-radius: 50%;
    display:inline-flex; align-items:center; justify-content:center;
    color: var(--ink-soft);
    transition: all .2s ease;
  }
  .socials a:hover{
    border-color: var(--ink);
    color: var(--ink);
  }
  .socials a svg{ width: 14px; height: 14px; }
  .copy{
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* ─── LIGHTBOX ───────────────────────────────── */
  .lb{
    position: fixed; inset: 0;
    background: rgba(20,18,14,.92);
    z-index: 200;
    display:flex; align-items:center; justify-content:center;
    padding: 48px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s ease;
  }
  .lb.open{ opacity: 1; pointer-events: auto; }
  .lb-inner{
    position: relative;
    max-width: 92vw;
    max-height: 88vh;
    transform: scale(.96);
    transition: transform .35s cubic-bezier(.2,.7,.2,1);
    display: flex; flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .lb.open .lb-inner{ transform: scale(1); }
  .lb-img-wrap{
    background: var(--paper);
    max-height: 78vh;
    overflow:hidden;
    box-shadow: 0 20px 80px rgba(0,0,0,.5);
  }
  .lb-img-wrap img, .lb-img-wrap .ph{
    max-height: 78vh;
    max-width: 92vw;
    width: auto; height: auto;
  }
  .lb-img-wrap iframe, .lb-img-wrap video{
    width: min(960px, 92vw);
    aspect-ratio: 16/9;
    border:0;
    background:#000;
    display:block;
  }
  .lb-cap{
    color: rgba(255,255,255,.85);
    font-family: var(--serif);
    font-size: 18px;
    letter-spacing: 0.02em;
    text-align: center;
  }
  .lb-cap .jp{
    display:block;
    font-family: var(--jp-sans);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,.55);
    margin-top: 6px;
  }
  .lb-close{
    position: absolute; top: -42px; right: -8px;
    color: rgba(255,255,255,.7);
    font-size: 11px; letter-spacing: .25em;
    text-transform: uppercase;
  }
  .lb-close:hover{ color: #fff; }
  .lb-nav{
    position: fixed; top: 50%; transform: translateY(-50%);
    color: rgba(255,255,255,.55);
    width: 56px; height: 56px;
    display:flex; align-items:center; justify-content:center;
    transition: color .2s ease;
  }
  .lb-nav:hover{ color: #fff; }
  .lb-nav.prev{ left: 24px; }
  .lb-nav.next{ right: 24px; }
  .lb-counter{
    position: fixed; bottom: 24px; left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,.45);
    font-size: 10px; letter-spacing: 0.4em;
    text-transform: uppercase;
  }

  /* page transitions */
  .fade-in{
    animation: fadein .8s ease both;
  }
  @keyframes fadein{
    from{ opacity:0; transform: translateY(12px); }
    to{ opacity:1; transform: none; }
  }

  /* dark theme */
  body.theme-dark{
    --bg: #14130f;
    --ink: #f0ece2;
    --ink-soft: #a39e90;
    --ink-faint: #5a564e;
    --rule: #2a2823;
    --paper: #1a1813;
  }
  body.theme-dark .ph{
    --ph-bg: #232019;
    --ph-ink: #6a6457;
  }
  body.theme-dark .submit:hover{ color: var(--bg); }

  /* warm cream theme */
  body.theme-cream{
    --bg: #efe9d9;
    --ink: #2c2718;
    --ink-soft: #6a5e3e;
    --ink-faint: #b3a47e;
    --rule: #d8cfb6;
    --paper: #f5f1e3;
  }
  body.theme-cream .ph{
    --ph-bg: #d8cfb6;
    --ph-ink: #6a5e3e;
  }
</style>

  </svg>
</template>
